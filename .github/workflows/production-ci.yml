name: Production CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  changes:
    name: Detect Changed Areas
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      docker: ${{ steps.filter.outputs.docker }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - backend/**
            frontend:
              - frontend/**
            docker:
              - docker-compose.yml
              - backend/Dockerfile
              - frontend/Dockerfile
              - .dockerignore
            workflows:
              - .github/workflows/**

  backend-quality:
    name: Backend Validation
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.workflows == 'true'
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci --no-audit --prefer-offline
          else
            npm install --no-audit --prefer-offline
          fi

      - name: Generate Prisma Client
        run: npm run prisma:generate

      - name: Validate backend JavaScript syntax
        run: git ls-files '*.js' | xargs -r -n 1 node --check

  frontend-quality:
    name: Frontend Validation
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.workflows == 'true'
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache frontend npm artifacts
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-frontend-npm-${{ hashFiles('frontend/package-lock.json', 'frontend/package.json') }}
          restore-keys: |
            ${{ runner.os }}-frontend-npm-

      - name: Install frontend dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci --no-audit --prefer-offline
          else
            echo "::warning::frontend/package-lock.json is missing. Commit a lockfile for reproducible production builds."
            npm install --no-audit --prefer-offline
          fi

      - name: Lint frontend
        run: npm run lint -- --max-warnings=0

      - name: Build frontend
        run: npm run build

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Review dependency changes
        uses: actions/dependency-review-action@v4

  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs:
      - changes
      - backend-quality
      - frontend-quality
    if: |
      github.event_name == 'push' &&
      (
        needs.changes.outputs.backend == 'true' ||
        needs.changes.outputs.frontend == 'true' ||
        needs.changes.outputs.docker == 'true' ||
        needs.changes.outputs.workflows == 'true'
      ) &&
      needs.backend-quality.result != 'failure' &&
      needs.frontend-quality.result != 'failure'
    timeout-minutes: 25
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: fyatta/backend:ci
          cache-from: type=gha,scope=backend-image
          cache-to: type=gha,mode=max,scope=backend-image

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: fyatta/frontend:ci
          cache-from: type=gha,scope=frontend-image
          cache-to: type=gha,mode=max,scope=frontend-image
