services:
  backend:
    build:
      context: ./backend
    container_name: fyatta-backend
    env_file:
      - ./backend/.env.docker
    environment:
      PORT: 8000
      NODE_ENV: production
      CLIENT_URL: http://localhost:3000
    ports:
      - "8000:8000"
    volumes:
      - backend_uploads:/app/uploads
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:8000/health >/dev/null 2>&1 || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    container_name: fyatta-frontend
    env_file:
      - ./frontend/.env.docker
    environment:
      PORT: 3000
      NODE_ENV: production
      API_BASE_URL_SERVER: ${API_BASE_URL_SERVER:-http://backend:8000}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:3000 >/dev/null 2>&1 || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  backend_uploads:
